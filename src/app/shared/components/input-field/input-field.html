<div class="field" [class.field--invalid]="control()?.touched && control()?.invalid">
  @if (label()) {
    <label [for]="id" class="field__label">{{ label() }}</label>
  }
  <input
    [id]="id"
    class="field__input"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />

  
  @for (msg of activeErrors; track msg) {
    <p class="field__error" role="alert">{{ msg }}</p>
  }
</div>
