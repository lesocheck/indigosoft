<div class="list__filters" role="group" aria-label="Фильтр по роли">
  <button
    class="filter-chip"
    [class.filter-chip--active]="value() === null"
    [attr.aria-pressed]="value() === null"
    (click)="filterChange.emit(null)"
  >
    Все
  </button>
  @for (role of roles; track role) {
    <button
      class="filter-chip"
      [class.filter-chip--active]="value() === role"
      [attr.aria-pressed]="value() === role"
      (click)="filterChange.emit(role)"
    >
      {{ roleLabels[role] }}
    </button>
  }
</div>
